name: "Lint workflows"

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint-workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv tool install actionlint
      - run: uv run actionlint .github/workflows/*.yml .github/workflows/*.yaml
