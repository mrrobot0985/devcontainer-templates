name: "CI - Test Templates"
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      templates: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v7

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            ollama-host-claude:
              - 'src/ollama-host-claude/**'
              - 'test/ollama-host-claude/**'
              - '.github/actions/smoke-test/**'
            ollama-host-claude-docker:
              - 'src/ollama-host-claude-docker/**'
              - 'test/ollama-host-claude-docker/**'
              - '.github/actions/smoke-test/**'
            ollama-host-studio:
              - 'src/ollama-host-studio/**'
              - 'test/ollama-host-studio/**'
              - '.github/actions/smoke-test/**'
            ollama-host-studio-docker:
              - 'src/ollama-host-studio-docker/**'
              - 'test/ollama-host-studio-docker/**'
              - '.github/actions/smoke-test/**'

  test:
    needs: [detect-changes]
    if: needs.detect-changes.outputs.templates != '[]'
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        templates: ${{ fromJSON(needs.detect-changes.outputs.templates) }}
    steps:
      - uses: actions/checkout@v7

      - name: Smoke test for '${{ matrix.templates }}'
        id: smoke_test
        uses: ./.github/actions/smoke-test
        with:
          template: "${{ matrix.templates }}"
