# CI workflow for devcontainer templates.
#
# Triggers:
#   - push to main
#   - any pull request
#
# Jobs:
#   lint    - static validation: JSON, templateOption placeholders, shellcheck,
#             ruff, generated READMEs, registry sync, and pytest.
#   detect-changes - figure out which templates changed so CI only tests those.
#   test    - build and run smoke tests for every changed template.
#
# This workflow must pass before a PR can be merged.
name: "CI - Test Templates"
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python lint tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff pytest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Validate devcontainer-template.json files
        run: |
          set -euo pipefail
          failed=0
          for json_file in src/*/devcontainer-template.json; do
              if python -m json.tool "$json_file" >/dev/null 2>&1; then
                  echo "OK: $json_file"
              else
                  echo "ERROR: invalid JSON in $json_file"
                  failed=1
              fi
          done
          exit "$failed"

      - name: Check templateOption placeholders
        run: |
          set -euo pipefail
          failed=0
          for json_file in src/*/devcontainer-template.json; do
              template_id=$(python -c "import json,sys; print(json.load(open('$json_file'))['id'])")
              template_dir="$(dirname "$json_file")"
              while IFS= read -r -d '' file; do
                  while IFS= read -r option; do
                      if ! python -c "import json,sys; data=json.load(open('$json_file')); sys.exit(0 if 'options' in data and '$option' in data['options'] else 1)"; then
                          echo "ERROR: templateOption '$option' in $file has no matching option in $template_id"
                          failed=1
                      fi
                  done < <(grep -oP '\$\{templateOption:\K[^}]+' "$file" 2>/dev/null || true)
              done < <(find "$template_dir" -type f -print0)
          done
          exit "$failed"

      - name: Run shellcheck on bootstrap scripts
        run: |
          set -euo pipefail
          failed=0
          for script in src/*/.devcontainer/bootstrap.sh; do
              if [ -f "$script" ]; then
                  if shellcheck "$script"; then
                      echo "OK: $script"
                  else
                      echo "ERROR: shellcheck failed for $script"
                      failed=1
                  fi
              fi
          done
          exit "$failed"

      - name: Run ruff on Python files
        run: ruff check scripts/ test/

      - name: Check generated template READMEs
        run: python scripts/generate-template-readmes.py --check

      - name: Check template registry sync
        run: npx tsx scripts/sync-template-registry.ts

      - name: Validate template structure
        run: python scripts/validate-templates.py

      - name: Run Python unit tests
        run: pytest test/

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Check markdown formatting
        run: uvx --with mdformat-gfm mdformat --check docs/ packages/create-devcontainer/README.md .github/CONTRIBUTING.md .github/CODE_OF_CONDUCT.md .github/SECURITY.md

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      templates: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            ollama-claude-cli:
              - 'src/ollama-claude-cli/**'
              - 'test/ollama-claude-cli/**'
              - '.github/actions/smoke-test/**'
            ollama-claude-cli-studio:
              - 'src/ollama-claude-cli-studio/**'
              - 'test/ollama-claude-cli-studio/**'
              - '.github/actions/smoke-test/**'
            ollama-claude-cli-cpu:
              - 'src/ollama-claude-cli-cpu/**'
              - 'test/ollama-claude-cli-cpu/**'
              - '.github/actions/smoke-test/**'
            ollama-claude-cli-compose:
              - 'src/ollama-claude-cli-compose/**'
              - 'test/ollama-claude-cli-compose/**'
              - '.github/actions/smoke-test/**'
            ollama-claude-cli-python:
              - 'src/ollama-claude-cli-python/**'
              - 'test/ollama-claude-cli-python/**'
              - '.github/actions/smoke-test/**'
            multi-ai-cli:
              - 'src/multi-ai-cli/**'
              - 'test/multi-ai-cli/**'
              - '.github/actions/smoke-test/**'
            grok-build-cli:
              - 'src/grok-build-cli/**'
              - 'test/grok-build-cli/**'
              - '.github/actions/smoke-test/**'
            grok-build-cli-studio:
              - 'src/grok-build-cli-studio/**'
              - 'test/grok-build-cli-studio/**'
              - '.github/actions/smoke-test/**'
            pi-coding-agent:
              - 'src/pi-coding-agent/**'
              - 'test/pi-coding-agent/**'
              - '.github/actions/smoke-test/**'
            hermes-agent:
              - 'src/hermes-agent/**'
              - 'test/hermes-agent/**'
              - '.github/actions/smoke-test/**'
            codex-cli:
              - 'src/codex-cli/**'
              - 'test/codex-cli/**'
              - '.github/actions/smoke-test/**'
            gemini-cli:
              - 'src/gemini-cli/**'
              - 'test/gemini-cli/**'
              - '.github/actions/smoke-test/**'
            opencode-cli:
              - 'src/opencode-cli/**'
              - 'test/opencode-cli/**'
              - '.github/actions/smoke-test/**'
            cloud-native-k8s:
              - 'src/cloud-native-k8s/**'
              - 'test/cloud-native-k8s/**'
              - '.github/actions/smoke-test/**'
            data-engineering-spark:
              - 'src/data-engineering-spark/**'
              - 'test/data-engineering-spark/**'
              - '.github/actions/smoke-test/**'

  test:
    needs: [lint, detect-changes]
    if: needs.detect-changes.outputs.templates != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        templates: ${{ fromJSON(needs.detect-changes.outputs.templates) }}
    steps:
      - uses: actions/checkout@v4

      - name: Smoke test for '${{ matrix.templates }}'
        id: smoke_test
        uses: ./.github/actions/smoke-test
        with:
          template: "${{ matrix.templates }}"

  smoke-tests:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always() && needs.lint.result == 'success'
    steps:
      - name: Evaluate smoke-test results
        run: |
          if [[ "${{ needs.test.result }}" == "skipped" ]]; then
            echo "No template changes detected — smoke tests skipped."
            exit 0
          fi
          if [[ "${{ needs.test.result }}" == "failure" ]]; then
            echo "FAIL: one or more smoke tests failed."
            exit 1
          fi
          echo "Smoke tests passed."
