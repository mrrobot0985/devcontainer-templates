# CI workflow for the @mrrobot0985/create-devcontainer npm package.
#
# Triggers:
#   - push to main or feature/fix branches (feat/**, fix/**)
#   - tags matching v* or @*
#   - pull requests targeting main
#   only when the changed paths include the package, the templates, the sync
#   script, or this workflow itself.
#
# Jobs:
#   typecheck-test-build - installs dependencies, type-checks, validates the
#                          template registry sync, runs package tests, and builds.
#   publish              - publishes the built package to npm when triggered
#                          by a tag.
name: create-devcontainer CI

on:
  push:
    branches: [main, feat/**, fix/**]
    tags: ['v*', '@*']
    paths:
      - "packages/create-devcontainer/**"
      - "src/**"
      - "scripts/sync-template-registry.ts"
      - ".github/workflows/create-devcontainer-ci.yaml"
  pull_request:
    branches: [main]
    paths:
      - "packages/create-devcontainer/**"
      - "src/**"
      - "scripts/sync-template-registry.ts"
      - ".github/workflows/create-devcontainer-ci.yaml"

env:
  NODE_VERSION: 20

defaults:
  run:
    working-directory: packages/create-devcontainer

jobs:
  typecheck-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Sync check
        run: npx tsx ../../scripts/sync-template-registry.ts

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  publish:
    needs: typecheck-test-build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
