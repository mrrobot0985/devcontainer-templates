name: create-devcontainer CI

on:
  push:
    branches: [main, feat/**, fix/**]
    tags: ['v*', '@*']
    paths:
      - "packages/create-devcontainer/**"
      - "src/**"
      - "scripts/sync-template-registry.ts"
      - ".github/workflows/create-devcontainer-ci.yaml"
  pull_request:
    branches: [main]
    paths:
      - "packages/create-devcontainer/**"
      - "src/**"
      - "scripts/sync-template-registry.ts"
      - ".github/workflows/create-devcontainer-ci.yaml"

env:
  NODE_VERSION: 20

defaults:
  run:
    working-directory: packages/create-devcontainer

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Type check
        run: npm run typecheck

      - name: Sync check
        run: npx tsx ../../scripts/sync-template-registry.ts

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  publish:
    needs: lint-and-test
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
