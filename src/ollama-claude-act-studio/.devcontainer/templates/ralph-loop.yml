name: Ralph Loop
on:
  workflow_dispatch:
    inputs:
      ticket_id:
        description: 'Ticket ID to process'
        required: true
        type: string
      branch:
        description: 'Working branch'
        required: true
        type: string
      iteration:
        description: 'Iteration number'
        required: true
        type: number

jobs:
  ralph:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0

      - name: Read task state
        id: state
        run: |
          TICKET="${{ github.event.inputs.ticket_id }}"
          ITER="${{ github.event.inputs.iteration }}"
          STATE_FILE=".ralph/state/${TICKET}.json"

          if [ -f "$STATE_FILE" ]; then
            echo "state_file=$STATE_FILE" >> "$GITHUB_OUTPUT"
            echo "task=$(jq -r '.task // empty' "$STATE_FILE")" >> "$GITHUB_OUTPUT"
            echo "status=$(jq -r '.status // "open"' "$STATE_FILE")" >> "$GITHUB_OUTPUT"
          else
            echo "state_file=$STATE_FILE" >> "$GITHUB_OUTPUT"
            echo "task=unknown" >> "$GITHUB_OUTPUT"
            echo "status=open" >> "$GITHUB_OUTPUT"
          fi
          echo "ticket=$TICKET" >> "$GITHUB_OUTPUT"
          echo "iteration=$ITER" >> "$GITHUB_OUTPUT"

      - name: Skip if already complete
        if: steps.state.outputs.status == 'complete'
        run: |
          echo "Ticket ${{ steps.state.outputs.ticket }} is already complete. Skipping."
          exit 0

      - name: Block if blocked
        if: steps.state.outputs.status == 'blocked'
        run: |
          echo "Ticket ${{ steps.state.outputs.ticket }} is blocked. Needs human intervention."
          exit 2

      - name: Execute task
        id: execute
        run: |
          TICKET="${{ steps.state.outputs.ticket }}"
          TASK="${{ steps.state.outputs.task }}"
          ITER="${{ steps.state.outputs.iteration }}"

          echo "=== Ralph Loop Iteration $ITER for $TICKET ==="
          echo "Task: $TASK"

          # Run the sandcastle runner if available
          if [ -f ".devcontainer/sandcastle/runner.mjs" ] && command -v node >/dev/null 2>&1; then
            node .devcontainer/sandcastle/runner.mjs \
              --ticket "$TICKET" \
              --task "$TASK" \
              --iteration "$ITER" \
              --workspace "${{ github.workspace }}"
          else
            echo "No sandcastle runner available. Task would be: $TASK"
            echo "Mark this ticket for manual execution."
          fi

      - name: Verify
        id: verify
        run: |
          # Run whatever verification the repo supports
          if [ -f "package.json" ] && command -v npm >/dev/null 2>&1; then
            npm test --if-present || true
            npm run lint --if-present || true
          fi

          if [ -f "pytest.ini" ] || [ -f "setup.cfg" ] || [ -f "pyproject.toml" ]; then
            if command -v pytest >/dev/null 2>&1; then
              pytest || true
            fi
          fi

          # Check for conventional commits on this branch
          if command -v git >/dev/null 2>&1; then
            BAD=$(git log --pretty=format:"%s" | grep -vE '^(feat|fix|docs|style|refactor|test|chore|ci|build|perf)(\(.+\))?!?: .+' | grep -v '^Merge' | head -5 || true)
            if [ -n "$BAD" ]; then
              echo "WARNING: Non-conventional commits detected."
            fi
          fi

      - name: Commit and tag iteration
        run: |
          TICKET="${{ steps.state.outputs.ticket }}"
          ITER="${{ steps.state.outputs.iteration }}"

          git config user.name "Ralph Loop"
          git config user.email "ralph@localhost"

          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "ralph(${TICKET}): iteration ${ITER} complete" || true
            git tag -f "ralph-${TICKET}-iter${ITER}" || true
          fi

      - name: Update task state
        run: |
          TICKET="${{ steps.state.outputs.ticket }}"
          ITER="${{ steps.state.outputs.iteration }}"
          STATE_FILE=".ralph/state/${TICKET}.json"
          mkdir -p "$(dirname "$STATE_FILE")"

          # Update state
          if [ -f "$STATE_FILE" ]; then
            jq --arg iter "$ITER" '.iteration = ($iter | tonumber) | .status = "pending-review"' "$STATE_FILE" > "${STATE_FILE}.tmp" && mv "${STATE_FILE}.tmp" "$STATE_FILE"
          else
            echo '{"ticket":"'"$TICKET"'","iteration":'"$ITER"',"status":"pending-review"}' > "$STATE_FILE"
          fi

          echo "Ticket $TICKET updated to pending-review."
