name: Bootstrap Prototype

on:
  workflow_dispatch:

jobs:
  explore-and-plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Explore README and plan next iteration
        env:
          ANTHROPIC_API_KEY: ""
          ANTHROPIC_AUTH_TOKEN: "${{ secrets.ANTHROPIC_AUTH_TOKEN || 'ollama' }}"
          ANTHROPIC_BASE_URL: "${{ secrets.ANTHROPIC_BASE_URL || 'http://host.docker.internal:11434' }}"
        run: |
          set -euo pipefail

          echo "=== Bootstrap Prototype Workflow ==="
          echo ""

          # Verify claude CLI is available
          if ! command -v claude >/dev/null 2>&1; then
            echo "WARNING: claude CLI not found in this runner."
            echo "  This workflow is designed to run in a devcontainer where claude is pre-installed."
            echo "  When using act locally, ensure the --bind flag is used so the host's claude binary is accessible."
            exit 0
          fi

          echo "Step 1 — Exploring README.md"
          echo ""
          if [ -f README.md ]; then
            claude -p "Read the README.md file and provide a concise summary of what this project does, its current state, and what technologies it uses."
          else
            echo "No README.md found. Skipping exploration."
          fi

          echo ""
          echo "Step 2 — Planning the next iteration for /prototype"
          echo ""
          claude -p "We are building the /prototype. Based on the project structure and README summary, identify the most logical next step. Suggest 2-3 concrete tasks that would move the prototype forward, ordered by priority."

          echo ""
          echo "=== Workflow complete ==="
